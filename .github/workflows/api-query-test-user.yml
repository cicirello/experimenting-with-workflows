name: Query User Specify User

on:
  workflow_dispatch:
    inputs:
      USER:
        description: 'The user to query'
        required: true

jobs:
  query:

    runs-on: ubuntu-latest
      
    steps:
    - uses: actions/checkout@v2

    - name: contributionsCollection query
      run: |
        gh api graphql -F user=${{ github.event.inputs.USER }} --cache 1h -f query='
          query($user: String!) {
            rateLimit {
              cost
            }
            user(login: $user) {
              contributionsCollection {
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
                restrictedContributionsCount
              }
            }
        }
        '
      env:
       GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: gh api query various user stats
      run: |
        gh api graphql -F user=${{ github.event.inputs.USER }} --paginate --cache 1h -f query='
          query($user: String!) {
            rateLimit {
              cost
            }
            user(login: $user) {
              login
              name
              createdAt
              followers(first: 1) {
                totalCount
              }
              following(first: 1) {
                totalCount
              }
              issues(first: 1) {
                totalCount
              }
              pullRequests(first: 1) {
                totalCount
              }
              sponsorshipsAsMaintainer(first: 1) {
                totalCount
              }
              sponsorshipsAsSponsor(first: 1)  {
                totalCount
              }
            }
          }
        '
        gh api graphql -F user=${{ github.event.inputs.USER }} --cache 1h -f query='
          query($user: String!) {
            rateLimit {
              cost
            }
            user(login: $user) {
              repositoriesContributedTo(first: 1) {
                totalCount
              }
            }
          }
        '
      env:
       GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

 
